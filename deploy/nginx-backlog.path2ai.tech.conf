# Nginx server block for backlog.path2ai.tech
# Copy to /etc/nginx/sites-available/ and enable, then run:
#   sudo certbot --nginx -d backlog.path2ai.tech
# Certbot will add SSL and redirect. Optional: add HSTS/security headers in the 443 block.

server {
    listen 80;
    listen [::]:80;
    server_name backlog.path2ai.tech;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
